<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Hub Dashboard</title>
    <style>
        :root {
            --green: #2ecc71;
            --green-dim: #1a7a43;
            --green-glow: rgba(46, 204, 113, 0.12);
            --glass: rgba(255,255,255,0.03);
            --glass-border: rgba(255,255,255,0.07);
            --text: #eaeaea;
            --text-mid: #888;
            --text-dim: #444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #070d09;
            background-image:
                radial-gradient(ellipse 60% 50% at 0% 0%, rgba(20,60,35,0.5) 0%, transparent 70%),
                radial-gradient(ellipse 40% 40% at 100% 100%, rgba(10,30,18,0.4) 0%, transparent 60%);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            height: 100vh;
            overflow: hidden;
            padding: 32px 40px;
        }

        .layout {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 32px;
            height: 100%;
        }

        /* ── LEFT ── */
        .left {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .time-block { margin-bottom: 4px; }

        .clock {
            font-size: 5.8rem;
            font-weight: 800;
            color: var(--green);
            letter-spacing: -4px;
            line-height: 1;
            text-shadow: 0 0 40px rgba(46,204,113,0.3);
        }

        .date {
            font-size: 1.1rem;
            color: var(--text-mid);
            margin-top: 6px;
            letter-spacing: 0.3px;
        }

        .card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 18px;
            padding: 18px 22px;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(46,204,113,0.3), transparent);
        }

        .card-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--text-dim);
            margin-bottom: 14px;
        }

        .weather-main {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .weather-temp {
            font-size: 3rem;
            font-weight: 700;
        }

        #weather-icon {
            width: 60px;
            height: 60px;
            display: none;
            filter: drop-shadow(0 0 8px rgba(46,204,113,0.2));
        }

        .weather-desc {
            font-size: 0.95rem;
            color: var(--green);
            margin-top: 6px;
            text-transform: capitalize;
        }

        .weather-meta {
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-top: 5px;
        }

        .divider {
            height: 1px;
            background: var(--glass-border);
            margin: 12px 0;
        }

        .indoor-row {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
        }

        .indoor-temp {
            font-size: 2.6rem;
            font-weight: 700;
        }

        .indoor-temp sup {
            font-size: 1.1rem;
            color: var(--green);
            font-weight: 400;
        }

        .indoor-right { text-align: right; }

        .hum-value {
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--green);
        }

        .hum-label {
            font-size: 0.6rem;
            letter-spacing: 2px;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        /* ── RIGHT ── */
        .right {
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .cal-header {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--text-dim);
            margin-bottom: 16px;
        }

        .calendar-scroll {
            flex: 1;
            overflow-y: auto;
            padding-right: 6px;
        }

        .calendar-scroll::-webkit-scrollbar { width: 3px; }
        .calendar-scroll::-webkit-scrollbar-track { background: transparent; }
        .calendar-scroll::-webkit-scrollbar-thumb { background: var(--green-dim); border-radius: 4px; }

        .day-header {
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--green);
            text-transform: uppercase;
            letter-spacing: 2.5px;
            padding: 4px 0 8px 0;
            margin-top: 18px;
            border-bottom: 1px solid var(--glass-border);
        }

        .day-header:first-child { margin-top: 0; }

        .event-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 10px 16px;
            margin-top: 6px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            transition: border-color 0.2s, background 0.2s;
            cursor: default;
        }

        .event-item:hover {
            background: rgba(46,204,113,0.04);
            border-color: rgba(46,204,113,0.2);
        }

        .event-bar {
            width: 3px;
            height: 24px;
            border-radius: 2px;
            flex-shrink: 0;
        }

        .event-time {
            font-size: 0.8rem;
            color: var(--text-mid);
            width: 52px;
            flex-shrink: 0;
        }

        .event-title {
            font-size: 0.95rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .footer {
            position: fixed;
            bottom: 14px;
            right: 24px;
            font-size: 0.6rem;
            color: #1a2e20;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

<div class="layout">
    <div class="left">
        <div class="time-block">
            <div id="clock" class="clock">00:00</div>
            <div id="date" class="date">Lädt...</div>
        </div>

        <div class="card">
            <div class="card-label">Leipzig · Außen</div>
            <div class="weather-main">
                <div id="temp" class="weather-temp">--</div>
                <img id="weather-icon" src="" alt="">
            </div>
            <div id="weather-desc" class="weather-desc">Wetter lädt...</div>
            <div class="weather-meta">
                Gefühlt <span id="feels">--</span> &nbsp;·&nbsp; <span id="humidity">--</span> Feuchte
            </div>
        </div>

        <div class="card">
            <div class="card-label">Innenklima</div>
            <div class="indoor-row">
                <div class="indoor-temp">
                    <span id="indoor-temp">--</span><sup>°C</sup>
                </div>
                <div class="indoor-right">
                    <div id="indoor-hum" class="hum-value">--%</div>
                    <div class="hum-label">Luftfeuchte</div>
                </div>
            </div>
        </div>
    </div>

    <div class="right">
        <div class="cal-header">Kalender · Upcoming</div>
        <div class="calendar-scroll">
            <div id="calendar-list"></div>
        </div>
    </div>
</div>

<div class="footer">SMART HUB · EXAYKS</div>

<script>
    function updateClock() {
        const now = new Date();
        document.getElementById('clock').innerText =
            now.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
        document.getElementById('date').innerText =
            now.toLocaleDateString('de-DE', { weekday: 'long', day: 'numeric', month: 'long' });
    }

    function updateDashboard() {
        fetch('/api/data')
            .then(r => r.json())
            .then(data => {
                document.getElementById('temp').innerText = data.temp;
                document.getElementById('feels').innerText = data.feels_like;
                document.getElementById('humidity').innerText = data.humidity;
                document.getElementById('weather-desc').innerText = data.news;

                if (data.icon) {
                    const icon = document.getElementById('weather-icon');
                    icon.src = `https://openweathermap.org/img/wn/${data.icon}@2x.png`;
                    icon.style.display = 'block';
                }

                document.getElementById('indoor-temp').innerText = data.indoor_temp;
                document.getElementById('indoor-hum').innerText =
                    data.indoor_hum === '--' ? '--' : data.indoor_hum + '%';

                const list = document.getElementById('calendar-list');
                list.innerHTML = '';

                const entries = Object.entries(data.events);
                if (entries.length === 0) {
                    list.innerHTML = '<div style="color:var(--text-dim);margin-top:20px;font-size:0.85rem;">Keine bevorstehenden Termine</div>';
                    return;
                }

                for (const [day, events] of entries) {
                    const header = document.createElement('div');
                    header.className = 'day-header';
                    header.innerText = day;
                    list.appendChild(header);

                    events.forEach(ev => {
                        const item = document.createElement('div');
                        item.className = 'event-item';
                        item.innerHTML = `
                            <div class="event-bar" style="background:${ev.color}"></div>
                            <div class="event-time">${ev.time}</div>
                            <div class="event-title">${ev.title}</div>
                        `;
                        list.appendChild(item);
                    });
                }
            })
            .catch(err => console.error('Update error:', err));
    }

    setInterval(updateClock, 1000);
    setInterval(updateDashboard, 30000);
    updateClock();
    updateDashboard();
</script>
</body>
</html>
